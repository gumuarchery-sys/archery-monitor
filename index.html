<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>射箭延遲監看</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: #000; }
  body {
    display: flex; flex-direction: column; align-items: center;
    font-family: -apple-system, "Helvetica Neue", sans-serif;
    color: #fff; height: 100dvh;
  }

  /* ── 直式 header ── */
  header {
    width: 100%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 10px 16px 6px;
  }
  header h1 { font-size: 1.05rem; color: #f0a500; letter-spacing: 2px; }

  /* ── 影像區 ── */
  #canvasWrap {
    position: relative; flex: 1; width: 100%;
    display: flex; align-items: center; justify-content: center;
    background: #000; overflow: hidden;
  }
  #display { display: block; }

  /* ── 狀態 overlay ── */
  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    background: #111;
  }
  #overlay.hidden { display: none; }
  #overlayIcon { font-size: 3.5rem; }
  #overlayText { font-size: 1rem; color: #aaa; letter-spacing: 1px; }
  #countdownNum { font-size: 5rem; font-weight: 900; color: #f0a500; line-height: 1; display: none; }

  /* ── 錄影 badge ── */
  #recBadge {
    position: absolute; top: 10px; left: 12px;
    display: none; align-items: center; gap: 6px;
    background: rgba(0,0,0,0.55); padding: 4px 10px;
    border-radius: 20px; font-size: 0.78rem;
  }
  #recBadge.show { display: flex; }
  #recDot { width: 8px; height: 8px; background: #e53935; border-radius: 50%; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* ── 直式 footer ── */
  footer {
    width: 100%; flex-shrink: 0; background: #111;
    border-top: 1px solid #222;
    padding: 10px 16px 16px;
    display: flex; flex-direction: column; gap: 10px;
  }

  /* ── 鏡頭選擇 ── */
  .cam-row { display: flex; justify-content: center; gap: 10px; }
  .cam-btn {
    flex: 1; max-width: 160px; height: 38px;
    border: 1px solid #444; border-radius: 19px;
    background: #2a2a2a; color: #aaa;
    font-size: 0.9rem; font-weight: bold; cursor: pointer;
    transition: all 0.15s;
  }
  .cam-btn.active { background: #333; color: #f0a500; border-color: #f0a500; }
  .cam-btn:active { opacity: 0.7; }

  /* ── 延遲調整 ── */
  .delay-row { display: flex; align-items: center; justify-content: center; gap: 0; }
  .delay-row label { color: #aaa; font-size: 0.85rem; margin-right: 12px; }
  .adj-btn {
    width: 44px; height: 44px;
    background: #2a2a2a; border: 1px solid #444;
    color: #fff; font-size: 1.4rem; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; user-select: none; flex-shrink: 0;
  }
  .adj-btn:active { background: #444; }
  #delayDisplay { width: 72px; text-align: center; font-size: 1.5rem; font-weight: bold; color: #f0a500; }
  #delayUnit { color: #aaa; font-size: 0.85rem; }

  /* ── 主按鈕 ── */
  .btn-row { display: flex; gap: 10px; justify-content: center; }
  .main-btn {
    flex: 1; max-width: 180px; height: 52px;
    border: none; border-radius: 26px;
    font-size: 1rem; font-weight: bold; cursor: pointer;
    letter-spacing: 1px; transition: opacity 0.15s;
  }
  .main-btn:active { opacity: 0.75; }
  #startBtn  { background: #f0a500; color: #111; }
  #pauseBtn  { background: #2a2a2a; color: #fff; border: 1px solid #555; }
  #stopBtn   { background: #e53935; color: #fff; }
  #shotBtn   { background: #1a6; color: #fff; }
  .hidden-btn { display: none !important; }

  /* ── 收起按鈕（直式：footer 頂部） ── */
  #panelToggle {
    display: none; /* 橫式才用 */
  }

  /* ════════════════════════════════
     橫式：全螢幕影像 + 右側浮動面板
  ════════════════════════════════ */
  @media (orientation: landscape) {
    header { display: none; }

    #canvasWrap {
      position: fixed; inset: 0;
      width: 100%; height: 100%; flex: none;
    }

    footer {
      position: fixed;
      right: 0; top: 0; bottom: 0; width: 200px;
      border-top: none;
      border-left: 1px solid rgba(255,255,255,0.1);
      background: rgba(10,10,10,0.65);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 20px 12px;
      justify-content: center;
      z-index: 20;
      transition: right 0.28s ease;
    }
    footer.collapsed { right: -164px; }

    /* 收起按鈕：貼在面板左邊緣 */
    #panelToggle {
      display: flex;
      position: absolute;
      left: -32px; top: 50%;
      transform: translateY(-50%);
      width: 28px; height: 52px;
      background: rgba(10,10,10,0.65);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.15);
      border-right: none;
      border-radius: 10px 0 0 10px;
      color: #aaa; font-size: 0.8rem;
      cursor: pointer;
      align-items: center; justify-content: center;
      z-index: 21;
    }
    #panelToggle:active { background: rgba(40,40,40,0.8); }

    .cam-row { flex-direction: column; gap: 8px; }
    .cam-btn { max-width: 100%; height: 36px; font-size: 0.82rem; }

    .delay-row label { display: none; }
    .adj-btn { width: 38px; height: 38px; font-size: 1.2rem; }
    #delayDisplay { font-size: 1.3rem; }

    .btn-row { flex-direction: column; gap: 8px; }
    .main-btn { max-width: 100%; height: 46px; font-size: 0.92rem; }
  }
</style>
</head>
<body>

<header>
  <h1>🏹 射箭延遲監看</h1>
</header>

<div id="canvasWrap">
  <canvas id="display"></canvas>
  <div id="overlay">
    <div id="overlayIcon">📷</div>
    <div id="overlayText">設定鏡頭後按「開始」</div>
    <div id="countdownNum"></div>
  </div>
  <div id="recBadge">
    <div id="recDot"></div>
    <span id="recLabel">錄影中</span>
  </div>
</div>

<footer id="footer">
  <!-- 收起按鈕（橫式用，貼在面板左緣） -->
  <button id="panelToggle" title="收起面板">❯</button>

  <div class="cam-row">
    <button class="cam-btn" id="camFront">📱 前鏡頭</button>
    <button class="cam-btn active" id="camBack">📷 後鏡頭</button>
  </div>
  <div class="delay-row">
    <label>延遲秒數</label>
    <button class="adj-btn" id="minusBtn">−</button>
    <div id="delayDisplay">5</div>
    <span id="delayUnit">秒</span>
    <button class="adj-btn" id="plusBtn">＋</button>
  </div>
  <div class="btn-row">
    <button class="main-btn" id="startBtn">▶ 開始</button>
    <button class="main-btn hidden-btn" id="pauseBtn">⏸ 暫停</button>
    <button class="main-btn hidden-btn" id="shotBtn">📸 截圖</button>
    <button class="main-btn hidden-btn" id="stopBtn">■ 停止</button>
  </div>
</footer>

<script>
const canvas       = document.getElementById('display');
const ctx          = canvas.getContext('2d');
const overlay      = document.getElementById('overlay');
const overlayIcon  = document.getElementById('overlayIcon');
const overlayText  = document.getElementById('overlayText');
const countdownNum = document.getElementById('countdownNum');
const recBadge     = document.getElementById('recBadge');
const recDot       = document.getElementById('recDot');
const recLabel     = document.getElementById('recLabel');
const footer       = document.getElementById('footer');
const panelToggle  = document.getElementById('panelToggle');
const startBtn     = document.getElementById('startBtn');
const pauseBtn     = document.getElementById('pauseBtn');
const shotBtn      = document.getElementById('shotBtn');
const stopBtn      = document.getElementById('stopBtn');
const delayDisplay = document.getElementById('delayDisplay');
const minusBtn     = document.getElementById('minusBtn');
const plusBtn      = document.getElementById('plusBtn');
const camFront     = document.getElementById('camFront');
const camBack      = document.getElementById('camBack');

const hiddenVideo = document.createElement('video');
hiddenVideo.muted = true; hiddenVideo.playsInline = true;
hiddenVideo.setAttribute('playsinline', '');

const capCanvas = document.createElement('canvas');
const capCtx = capCanvas.getContext('2d', { willReadFrequently: true });

let delaySeconds = 5, running = false, paused = false;
let stream = null, facingMode = 'environment';
let frameBuffer = [], loopTimer = null, startTime = 0;
let CAP_W = 480, CAP_H = 640;
let wakeLock = null;

const MAX_DIM = 720, FPS = 15, INTERVAL = Math.round(1000 / FPS);

// ── 收起面板 ──
panelToggle.addEventListener('click', () => {
  footer.classList.toggle('collapsed');
  panelToggle.textContent = footer.classList.contains('collapsed') ? '❮' : '❯';
});

// ── 鏡頭選擇 ──
camBack.addEventListener('click', () => {
  facingMode = 'environment';
  camBack.classList.add('active'); camFront.classList.remove('active');
  if (running) { stopCapture(); startCamera(); }
});
camFront.addEventListener('click', () => {
  facingMode = 'user';
  camFront.classList.add('active'); camBack.classList.remove('active');
  if (running) { stopCapture(); startCamera(); }
});

// ── 延遲調整 ──
minusBtn.addEventListener('click', () => {
  if (delaySeconds > 1) { delaySeconds--; delayDisplay.textContent = delaySeconds; }
});
plusBtn.addEventListener('click', () => {
  if (delaySeconds < 60) { delaySeconds++; delayDisplay.textContent = delaySeconds; }
});

startBtn.addEventListener('click', () => startCamera());

pauseBtn.addEventListener('click', () => {
  paused = !paused;
  pauseBtn.textContent = paused ? '▶ 繼續' : '⏸ 暫停';
  recDot.style.animationPlayState = paused ? 'paused' : 'running';
});

// ── 截圖 ──
shotBtn.addEventListener('click', () => {
  const dataUrl = canvas.toDataURL('image/png');
  // iOS Safari 開新分頁讓使用者長按儲存；其他瀏覽器直接下載
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = `射箭_${new Date().toLocaleTimeString('zh-TW').replace(/:/g,'-')}.png`;
  a.target = '_blank';
  a.click();
});

stopBtn.addEventListener('click', stopAll);

function show(...els) { els.forEach(el => el.classList.remove('hidden-btn')); }
function hide(...els) { els.forEach(el => el.classList.add('hidden-btn')); }

// ── 螢幕常亮 ──
async function acquireWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch(e) {}
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}
document.addEventListener('visibilitychange', () => {
  if (running && document.visibilityState === 'visible') acquireWakeLock();
});

// ── 開始相機 ──
async function startCamera() {
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    hiddenVideo.srcObject = stream;
    await hiddenVideo.play();

    await new Promise(resolve => {
      if (hiddenVideo.videoWidth > 0) { resolve(); return; }
      hiddenVideo.addEventListener('loadedmetadata', resolve, { once: true });
    });

    const vw = hiddenVideo.videoWidth  || 480;
    const vh = hiddenVideo.videoHeight || 640;
    const scale = Math.min(1, MAX_DIM / Math.max(vw, vh));
    CAP_W = Math.round(vw * scale);
    CAP_H = Math.round(vh * scale);
    capCanvas.width = CAP_W; capCanvas.height = CAP_H;
    resizeDisplay();

    frameBuffer = []; startTime = Date.now();
    running = true; paused = false;

    hide(startBtn); show(pauseBtn, shotBtn, stopBtn);
    pauseBtn.textContent = '⏸ 暫停';
    recBadge.classList.add('show');
    recDot.style.animationPlayState = 'running';
    showOverlay('countdown');
    acquireWakeLock();
    startLoop();
  } catch (e) {
    showOverlay('error', e.message);
  }
}

function startLoop() {
  if (!running) return;
  tick();
  loopTimer = setTimeout(startLoop, INTERVAL);
}

function tick() {
  if (!running || paused || hiddenVideo.readyState < 2) return;
  const now = Date.now();

  capCtx.drawImage(hiddenVideo, 0, 0, CAP_W, CAP_H);
  const imageData = capCtx.getImageData(0, 0, CAP_W, CAP_H);
  frameBuffer.push({ data: imageData, ts: now });

  const cutoff = now - (delaySeconds + 4) * 1000;
  while (frameBuffer.length && frameBuffer[0].ts < cutoff) frameBuffer.shift();

  const targetTs = now - delaySeconds * 1000;
  let best = null;
  for (let i = frameBuffer.length - 1; i >= 0; i--) {
    if (frameBuffer[i].ts <= targetTs) { best = frameBuffer[i]; break; }
  }

  if (best) {
    overlay.classList.add('hidden');
    ctx.putImageData(best.data, 0, 0);
    recLabel.textContent = `延遲 ${delaySeconds} 秒`;
  } else {
    const rem = Math.ceil((delaySeconds * 1000 - (now - startTime)) / 1000);
    countdownNum.textContent = rem > 0 ? rem : '...';
  }
}

function stopCapture() {
  running = false; paused = false;
  if (loopTimer) clearTimeout(loopTimer);
  if (stream) stream.getTracks().forEach(t => t.stop());
  frameBuffer = [];
}

function stopAll() {
  stopCapture(); stream = null;
  releaseWakeLock();
  show(startBtn); hide(pauseBtn, shotBtn, stopBtn);
  recBadge.classList.remove('show');
  showOverlay('idle');
}

function showOverlay(mode, msg) {
  overlay.classList.remove('hidden');
  if (mode === 'idle') {
    overlayIcon.style.display = '';
    overlayIcon.textContent = '📷';
    overlayText.textContent = '設定鏡頭後按「開始」';
    countdownNum.style.display = 'none';
  } else if (mode === 'countdown') {
    overlayIcon.style.display = 'none';
    overlayText.textContent = '準備播放延遲畫面…';
    countdownNum.style.display = '';
  } else if (mode === 'error') {
    overlayIcon.style.display = '';
    overlayIcon.textContent = '⚠️';
    overlayText.textContent = '相機錯誤：' + (msg || '');
    countdownNum.style.display = 'none';
  }
}

function resizeDisplay() {
  const availW = window.innerWidth;
  const isLandscape = window.innerWidth > window.innerHeight;
  const availH = isLandscape
    ? window.innerHeight
    : document.getElementById('canvasWrap').clientHeight;
  const ratio = CAP_W / CAP_H;
  let w = availW, h = availW / ratio;
  if (h > availH) { h = availH; w = availH * ratio; }
  canvas.width = CAP_W; canvas.height = CAP_H;
  canvas.style.width  = Math.round(w) + 'px';
  canvas.style.height = Math.round(h) + 'px';
}

window.addEventListener('resize', resizeDisplay);
window.addEventListener('orientationchange', () => setTimeout(resizeDisplay, 200));
resizeDisplay();
</script>
</body>
</html>
